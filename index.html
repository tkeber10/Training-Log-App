<script>
  // Register service worker for auto-updates (no more manual cache clearing)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          // Check for updates every time the app loads
          reg.update();
          // When a new SW is waiting, activate it immediately
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available — tell SW to take over immediately
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        })
        .catch(err => console.log('SW registration failed:', err));

      // When SW takes control, reload once to use new version
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    });
  }
</script>

// ── localStorage helpers (runs on YOUR device) ─────────────────
function loadKey(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveKey(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.error("save failed", key, e); }
}

const todayStr = () => { const d = new Date(); const o = d.getTimezoneOffset(); return new Date(d - o*60000).toISOString().slice(0,10); };
const fmtDate = (s) => new Date(s + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtRest = (sec) => { const m = Math.floor(sec/60), s = sec%60; return m && s ? `${m}m ${s}s` : m ? `${m}m` : `${s}s`; };

// ── GitHub auth & gist backup helpers ──
const getGitHubToken = () => localStorage.getItem("github_token");
const setGitHubToken = (token) => localStorage.setItem("github_token", token);
const clearGitHubToken = () => localStorage.removeItem("github_token");

const createGitHubGist = async (token, content) => {
  const now = new Date();
  const ts = now.toISOString().replace(/[:-]/g, "").slice(0, 15);
  const filename = `fitness-${ts}.json`;
  try {
    const resp = await fetch("https://api.github.com/gists", {
      method: "POST",
      headers: {
        "Authorization": `token ${token}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        description: `Fitness tracker backup - ${now.toLocaleString()}`,
        public: false,
        files: { [filename]: { content: JSON.stringify(content, null, 2) } },
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const gist = await resp.json();
    return { success: true, url: gist.html_url, id: gist.id };
  } catch (e) {
    return { success: false, error: e.message };
  }
};

const C = {
  bg:"#11151c", panel:"#1a212b", panel2:"#222b38", line:"#2e3a49",
  text:"#e8edf3", dim:"#8a98a8", amber:"#e0a449", green:"#5fb87a", red:"#d4685f", blue:"#5b9bd5",
};

function App() {
  const [tab, setTab] = useState("today");
  const [loaded, setLoaded] = useState(false);
  const [days, setDays] = useState({});
  const [workouts, setWorkouts] = useState({});
  const [savedMeals, setSavedMeals] = useState([]);
  const [completed, setCompleted] = useState({});
  const [active, setActive] = useState(null);
  const [sel, setSel] = useState(todayStr());
  const [supplements, setSupplements] = useState({}); // { 'YYYY-MM-DD': { Creatine: true, ... } }
  const [water, setWater] = useState({});             // { 'YYYY-MM-DD': 2 } (litres)

  useEffect(() => {
    setDays(loadKey("days", {}));
    setWorkouts(loadKey("workouts", {}));
    setSavedMeals(loadKey("savedMeals", []));
    setCompleted(loadKey("completed", {}));
    setActive(loadKey("activeSession", null));
    setSupplements(loadKey("supplements", {}));
    setWater(loadKey("water", {}));
    setLoaded(true);
  }, []);
  useEffect(() => { if (loaded) saveKey("days", days); }, [days, loaded]);
  useEffect(() => { if (loaded) saveKey("workouts", workouts); }, [workouts, loaded]);
  useEffect(() => { if (loaded) saveKey("savedMeals", savedMeals); }, [savedMeals, loaded]);
  useEffect(() => { if (loaded) saveKey("completed", completed); }, [completed, loaded]);
  useEffect(() => { if (loaded) saveKey("activeSession", active); }, [active, loaded]);
  useEffect(() => { if (loaded) saveKey("supplements", supplements); }, [supplements, loaded]);
  useEffect(() => { if (loaded) saveKey("water", water); }, [water, loaded]);

  const day = days[sel] || { weight: "", meals: [], dayType: "training", note: "" };
  const setDay = (patch) => setDays((d) => ({ ...d, [sel]: { ...day, ...patch } }));

  const totals = useMemo(() => {
    const cal = (day.meals||[]).reduce((a,m)=>a+(+m.cal||0),0);
    const pro = (day.meals||[]).reduce((a,m)=>a+(+m.pro||0),0);
    return { cal, pro };
  }, [day]);
  const target = DAY_TARGETS[day.dayType] || PLAN.calorieTarget;

  if (!loaded) return <div style={{...page, display:"flex", alignItems:"center", justifyContent:"center"}}><span style={{color:C.dim}}>Loading…</span></div>;

  return (
    <div style={page}>
      <header style={header}>
        <div>
          <div style={{fontSize:12, letterSpacing:2, color:C.amber, textTransform:"uppercase"}}>{PLAN.phase}</div>

        {tab === "workout" && <WorkoutView sel={sel} workouts={workouts} setWorkouts={setWorkouts} active={active} setActive={setActive} completed={completed} setCompleted={setCompleted} />}
        {tab === "progress" && <ProgressView days={days} completed={completed} setCompleted={setCompleted} workouts={workouts} savedMeals={savedMeals} setDays={setDays} setWorkouts={setWorkouts} setSavedMeals={setSavedMeals} supplements={supplements} setSupplements={setSupplements} water={water} setWater={setWater} />}

// ── Weekly day strip (MyFitnessPal-style) with prev/next day arrows ──
function DayStrip({ sel, setSel, days, completed, workouts }) {
  const shift = (dateStr, n) => {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  };
  // build the week (Sun–Sat) containing sel
  const selDate = new Date(sel + "T00:00:00");
  const weekStart = shift(sel, -selDate.getDay());
  const week = Array.from({ length: 7 }, (_, i) => shift(weekStart, i));
  const DOW = ["S", "M", "T", "W", "T", "F", "S"];

  return (
    <div style={dayStripWrap}>
      <button onClick={() => setSel(shift(sel, -1))} style={arrowBtn} aria-label="Previous day">‹</button>
      <div style={{ display: "flex", flex: 1, justifyContent: "space-between", gap: 2 }}>
        {week.map((d) => {
          const isSel = d === sel;
          const dd = new Date(d + "T00:00:00");
          const isToday = d === todayStr();
          const rec = completed[d] || {};
          const hasData = (days[d] && (days[d].weight || (days[d].meals && days[d].meals.length))) || workouts[d];
          const dot = rec.gym ? C.green : rec.zone2 ? C.blue : hasData ? C.dim : "transparent";
          return (
            <button key={d} onClick={() => setSel(d)} style={{
              ...dayCell,
              background: isSel ? C.amber : "transparent",
              color: isSel ? "#1a1206" : C.text,
            }}>
              <span style={{ fontSize: 10, opacity: 0.7 }}>{DOW[dd.getDay()]}</span>
              <span style={{ fontSize: 15, fontWeight: isSel || isToday ? 700 : 400 }}>{dd.getDate()}</span>
              <span style={{ width: 5, height: 5, borderRadius: 3, background: isSel ? "#1a1206" : dot }} />
            </button>
          );
        })}
      </div>
      <button onClick={() => setSel(shift(sel, 1))} style={arrowBtn} aria-label="Next day">›</button>
    </div>
  );
}

function TodayView({ day, setDay, totals, target, savedMeals, setSavedMeals, sel, supplements, setSupplements, water, setWater }) {
  const [label, setLabel] = useState(""); const [cal, setCal] = useState(""); const [pro, setPro] = useState("");
  const [search, setSearch] = useState(""); const [showList, setShowList] = useState(false);

  // Supplement helpers
  const todaySupps = supplements[sel] || {};
  const toggleSupp = (name) => {
    setSupplements((s) => ({
      ...s,
      [sel]: { ...(s[sel] || {}), [name]: !(s[sel] && s[sel][name]) }
    }));
  };
  const suppStreak = (name) => {
    let streak = 0;
    const d = new Date(sel + "T00:00:00");
    while (true) {
      const key = d.toISOString().slice(0, 10);
      if (supplements[key] && supplements[key][name]) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  };

  // Water helpers
  const todayWater = water[sel] || 0;
  const addWater = () => {
    setWater((w) => ({ ...w, [sel]: Math.min((w[sel] || 0) + WATER_BOTTLE, WATER_GOAL + 2) }));
  };
  const removeWater = () => {
    setWater((w) => ({ ...w, [sel]: Math.max((w[sel] || 0) - WATER_BOTTLE, 0) }));
  };
  const waterStreak = () => {
    let streak = 0;
    const d = new Date(sel + "T00:00:00");
    while (true) {
      const key = d.toISOString().slice(0, 10);
      if ((water[key] || 0) >= WATER_GOAL) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  };
  const wStreak = waterStreak();
  const waterPct = Math.min((todayWater / WATER_GOAL) * 100, 100);
  const waterDone = todayWater >= WATER_GOAL;

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    const base = q ? savedMeals.filter((m)=>m.label.toLowerCase().includes(q)) : savedMeals;
    return base.slice(0, 30);
  }, [search, savedMeals]);

  const addMeal = () => {
    if (!cal && !pro) return;
    const meal = { label: label || "Meal", cal: +cal||0, pro: +pro||0 };
    setDay({ meals: [...(day.meals||[]), meal] });
    if (label.trim()) {
      const key = `${label.trim().toLowerCase()}|${meal.cal}|${meal.pro}`;
      const exists = savedMeals.some((m)=>`${m.label.trim().toLowerCase()}|${m.cal}|${m.pro}`===key);
      if (!exists) setSavedMeals([{label:label.trim(), cal:meal.cal, pro:meal.pro}, ...savedMeals]);
    }
    setLabel(""); setCal(""); setPro("");
  };
  const logSaved = (m) => { setDay({ meals:[...(day.meals||[]), {label:m.label, cal:m.cal, pro:m.pro}] }); setSearch(""); setShowList(false); };
  const forgetSaved = (i) => setSavedMeals(savedMeals.filter((_,idx)=>idx!==i));
  const removeMeal = (i) => setDay({ meals: day.meals.filter((_,idx)=>idx!==i) });

  const calRemaining = target - totals.cal;
  const proRemaining = PLAN.proteinTarget - totals.pro;
  const calPct = Math.min(100, (totals.cal/target)*100);
  const proPct = Math.min(100, (totals.pro/PLAN.proteinTarget)*100);

  return (
    <React.Fragment>
      <div style={card}>
        <div style={{display:"flex", gap:12, flexWrap:"wrap"}}>
          <label style={{flex:1, minWidth:130}}>
            <span style={fieldLabel}>Morning weight (lb)</span>
            <input type="number" inputMode="decimal" placeholder="—" value={day.weight} onChange={(e)=>setDay({weight:e.target.value})} style={input} />
          </label>
          <label style={{flex:1, minWidth:130}}>
            <span style={fieldLabel}>Day type</span>
            <select value={day.dayType} onChange={(e)=>setDay({dayType:e.target.value})} style={input}>
              <option value="training">Training (2,550)</option>
              <option value="zone2">Zone 2 (2,500)</option>
              <option value="golf">Golf (2,950)</option>
              <option value="rest">Rest (2,400)</option>
            </select>
          </label>
        </div>
        <label style={{display:"block", marginTop:12}}>
          <span style={fieldLabel}>Note (optional)</span>
          <input placeholder="e.g. post-DEXA meal — bloat, not fat" value={day.note||""} onChange={(e)=>setDay({note:e.target.value})} style={input} />
        </label>
      </div>

      <div style={{display:"flex", gap:12, marginTop:14}}>
        <Stat big={calRemaining>=0?calRemaining:0} label={calRemaining>=0?"calories left":"over target"} sub={`${totals.cal} / ${target}`} pct={calPct} color={calRemaining<0?C.red:C.amber} over={calRemaining<0?Math.abs(calRemaining):0} />
        <Stat big={proRemaining>0?proRemaining:0} label={proRemaining>0?"protein left (g)":"protein hit ✓"} sub={`${totals.pro} / ${PLAN.proteinTarget}g`} pct={proPct} color={proRemaining<=0?C.green:C.blue} />
      </div>

      <div style={{...card, marginTop:14}}>
        <span style={fieldLabel}>Log a meal</span>
        {savedMeals.length > 0 && (
          <div style={{marginTop:10, position:"relative"}}>
            <input placeholder={`Search ${savedMeals.length} saved meals…`} value={search}
              onChange={(e)=>{setSearch(e.target.value); setShowList(true);}}
              onFocus={()=>setShowList(true)} onBlur={()=>setTimeout(()=>setShowList(false),150)} style={input} />
            {showList && filtered.length>0 && (
              <div style={dropdown}>
                {filtered.map((m,i)=>(
                  <div key={i} style={dropItem}>
                    <button className="drop-main" onMouseDown={(e)=>{e.preventDefault(); logSaved(m);}} style={dropMain}>
                      <span>{m.label}</span><span style={{color:C.dim, fontSize:12}}>{m.cal} kcal · {m.pro}g</span>
                    </button>
                    <button onMouseDown={(e)=>{e.preventDefault(); forgetSaved(savedMeals.indexOf(m));}} style={chipX}>×</button>
                  </div>
                ))}
              </div>
            )}
            {showList && search.trim() && filtered.length===0 && (
              <div style={dropdown}><div style={{padding:"10px 12px", color:C.dim, fontSize:13}}>No match for "{search}". Enter below to log &amp; save it.</div></div>
            )}
          </div>
        )}
        <div style={{display:"flex", gap:8, marginTop:12, flexWrap:"wrap"}}>
          <input placeholder="Name (saves for reuse)" value={label} onChange={(e)=>setLabel(e.target.value)} style={{...input, flex:"2 1 140px"}} />
          <input type="number" inputMode="numeric" placeholder="kcal" value={cal} onChange={(e)=>setCal(e.target.value)} style={{...input, flex:"1 1 70px"}} />
          <input type="number" inputMode="numeric" placeholder="protein" value={pro} onChange={(e)=>setPro(e.target.value)} style={{...input, flex:"1 1 70px"}} />
          <button onClick={addMeal} style={addBtn}>Add</button>
        </div>
      </div>

      <div style={{marginTop:14}}>
        {(day.meals||[]).length===0 && <p style={{color:C.dim, textAlign:"center", padding:20, fontSize:14}}>No meals logged yet.</p>}
        {(day.meals||[]).map((m,i)=>(
          <div key={i} style={mealRow}>
            <span style={{flex:1}}>{m.label}</span>
            <span style={{color:C.amber, width:64, textAlign:"right"}}>{m.cal} kcal</span>
            <span style={{color:C.blue, width:52, textAlign:"right"}}>{m.pro}g</span>
            <button onClick={()=>removeMeal(i)} style={delBtn}>×</button>
          </div>
        ))}
      </div>

      {/* ── Water tracker ── */}
      <div style={card}>
        <div style={{display:"flex", alignItems:"center", marginBottom:10}}>
          <span style={{...fieldLabel, flex:1}}>💧 Water</span>
          {wStreak > 0 && <span style={{fontSize:12, color:C.blue}}>🔥 {wStreak} day streak</span>}
        </div>
        {/* Progress bar */}
        <div style={{position:"relative", height:28, background:C.panel2, borderRadius:14, overflow:"hidden", marginBottom:10}}>
          <div style={{
            height:"100%", borderRadius:14,
            width:`${waterPct}%`,
            background: waterDone ? `linear-gradient(90deg, ${C.blue}, #7ec8e3)` : `linear-gradient(90deg, #2a5f8a, ${C.blue})`,
            transition:"width 0.4s ease"
          }} />

      {/* ── Supplement checklist ── */}

        {SUPPLEMENTS.map((name) => {
          const done = !!todaySupps[name];
          const streak = suppStreak(name);
          return (
            <button key={name} onClick={()=>toggleSupp(name)} style={{
              display:"flex", alignItems:"center", gap:12, width:"100%",
              background: done ? "rgba(95,184,122,0.12)" : C.panel2,
              border: `1px solid ${done ? C.green : C.line}`,
              borderRadius:10, padding:"12px 14px", marginBottom:8,
              cursor:"pointer", textAlign:"left",
            }}>
              <span style={{
                width:26, height:26, borderRadius:13, flexShrink:0,
                background: done ? C.green : "transparent",
                border: `2px solid ${done ? C.green : C.dim}`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:14, color:"#fff",

              <span style={{flex:1, fontSize:14, color: done ? C.green : C.text, fontWeight: done?600:400}}>{name}</span>

                <span style={{fontSize:11, color: streak >= 7 ? C.amber : C.dim}}>

        {SUPPLEMENTS.every((s)=>todaySupps[s]) && (

// ── Rest timer (timestamp-based: keeps correct time even when app is minimized) ──
function RestTimer({ endAt, onDone, onSkip }) {
  const [now, setNow] = useState(Date.now());
  const [over, setOver] = useState(false);

  useEffect(() => {
    setOver(false);
    // tick every 250ms; recompute from wall-clock so minimizing doesn't pause it
    const id = setInterval(() => setNow(Date.now()), 250);
    // also resync immediately when the tab/app becomes visible again
    const onVis = () => setNow(Date.now());
    document.addEventListener("visibilitychange", onVis);
    return () => { clearInterval(id); document.removeEventListener("visibilitychange", onVis); };
  }, [endAt]);

  const left = Math.round((endAt - now) / 1000);
  useEffect(() => {
    if (left <= 0 && !over) {
      setOver(true);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      if (onDone) onDone();
    }
  }, [left, over, onDone]);

  const mm = Math.floor(Math.abs(left) / 60);
  const ss = Math.abs(left) % 60;
  const disp = `${mm}:${ss.toString().padStart(2, "0")}`;

  return (
    <div style={{
      ...card, position: "sticky", top: 8, zIndex: 30, marginBottom: 14,
      textAlign: "center", borderColor: over ? C.green : C.amber,
      background: over ? "rgba(95,184,122,0.15)" : C.panel,
    }}>
      {over ? (
        <div style={{ fontSize: 22, fontWeight: 700, color: C.green }}>Rest over — go! 💪</div>
      ) : (
        <React.Fragment>
          <div style={{ fontSize: 12, color: C.dim, textTransform: "uppercase", letterSpacing: 1 }}>Rest</div>
          <div style={{ fontSize: 40, fontWeight: 700, color: C.amber, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>{disp}</div>
        </React.Fragment>
      )}
      <button onClick={onSkip} style={{ ...ghostBtn, marginTop: 8, borderColor: over ? C.green : C.line, color: over ? C.green : C.dim }}>
        {over ? "Dismiss" : "Skip rest"}
      </button>
    </div>
  );
}

function WorkoutView({ sel, workouts, setWorkouts, active, setActive, completed, setCompleted }) {
  const [session, setSession] = useState("Push - Lean Bulk - 2026");
  const [timer, setTimer] = useState(null); // { endAt }
  const [abandonArmed, setAbandonArmed] = useState(false);
  const [exPicker, setExPicker] = useState(false); // show "add exercise from another routine" modal

  const lastTimeFor = (name) => {
    const prior = Object.keys(workouts).filter((d)=>d<sel).sort((a,b)=>b.localeCompare(a));
    for (const d of prior) {
      const dayRec = workouts[d];
      if (!Array.isArray(dayRec)) continue; // skip run-day records (objects, not exercise arrays)
      const ex = dayRec.find((e)=>e.exercise===name);
      if (ex) { const done = ex.sets.filter((s)=>s.w!==""||s.r!==""); if (done.length) return {date:d, sets:done}; }
    }
    return null;
  };
  const bestFor = (name) => {
    let best = null;
    for (const d of Object.keys(workouts)) {
      if (d > sel) continue;
      const dayRec = workouts[d];
      if (!Array.isArray(dayRec)) continue; // skip run-day records
      const ex = dayRec.find((e)=>e.exercise===name);
      if (!ex) continue;
      for (const s of ex.sets) {
        const w = parseFloat(s.w), r = parseFloat(s.r);
        if (isNaN(w) || isNaN(r)) continue;
        if (!best || w > best.w || (w === best.w && r > best.r)) best = { w, r, date: d };
      }
    }
    return best;
  };

  // ── Start / finish / abandon ──
  const startSession = () => {
    if (isRun(session)) {
      setActive({ name: session, date: sel, run: true, startedAt: Date.now(),
        dist: "", time: "", hr: "" });
      setTimer(null);
      return;
    }
    setActive({
      name: session,
      date: sel,
      startedAt: Date.now(),
      exercises: SPLIT[session].map((ex) => {
        const last = lastTimeFor(ex.name);
        // prefill NUMBER of sets AND their weight/reps from last time (default 3 empty if none)
        const n = last ? last.sets.length : 3;
        return { exercise: ex.name, range: ex.range, cat: ex.cat,
          sets: Array.from({ length: n }, (_, i) => {
            const prevSet = last && last.sets[i];
            return { w: prevSet ? prevSet.w : "", r: prevSet ? prevSet.r : "", done: false };
          }) };
      }),
    });
    setTimer(null);
  };

  // Reopen an already-logged day (lifting or run) for correction. Sets reload as "done"
  // (since they were saved) but remain editable via the existing edit/unlog controls.
  const editLoggedSession = () => {
    const rec = workouts[sel];
    if (!rec) return;
    if (rec.run) {
      setActive({ name: "Zone 2 Run - 2026", date: sel, run: true, startedAt: Date.now(),
        dist: rec.dist || "", time: rec.time || "", hr: rec.hr || "", editing: true });
    } else {
      setActive({
        name: "Edit — " + fmtDate(sel),
        date: sel,
        startedAt: Date.now(),
        editing: true,
        exercises: rec.map((ex) => ({
          exercise: ex.exercise, range: ex.range, cat: ex.cat,
          sets: ex.sets.map((s) => ({ w: s.w, r: s.r, done: true })),
        })),
      });
    }
    setTimer(null);
  };

  const updateActive = (patch) => setActive({ ...active, ...patch });
  const updateSet = (ei, si, field, val) => {
    const ex = [...active.exercises];
    ex[ei] = { ...ex[ei], sets: ex[ei].sets.map((s, i) => i === si ? { ...s, [field]: val } : s) };
    updateActive({ exercises: ex });
  };
  const logSet = (ei, si) => {
    const ex = [...active.exercises];
    const s = ex[ei].sets[si];
    if (s.w === "" && s.r === "") return;
    ex[ei] = { ...ex[ei], sets: ex[ei].sets.map((x, i) => i === si ? { ...x, done: true } : x) };
    if (si === ex[ei].sets.length - 1) ex[ei].sets.push({ w: "", r: "", done: false });
    updateActive({ exercises: ex });
    setTimer({ endAt: Date.now() + (REST[ex[ei].cat] || 90) * 1000 });
  };
  const unlogSet = (ei, si) => { // make a logged set editable again
    const ex = [...active.exercises];
    ex[ei] = { ...ex[ei], sets: ex[ei].sets.map((x, i) => i === si ? { ...x, done: false } : x) };
    updateActive({ exercises: ex });
  };
  const addSet = (ei) => {
    const ex = [...active.exercises];
    ex[ei] = { ...ex[ei], sets: [...ex[ei].sets, { w: "", r: "", done: false }] };
    updateActive({ exercises: ex });
  };
  const removeSet = (ei, si) => {
    const ex = [...active.exercises];
    if (ex[ei].sets.length <= 1) return;
    ex[ei] = { ...ex[ei], sets: ex[ei].sets.filter((_, i) => i !== si) };
    updateActive({ exercises: ex });
  };

  // Pull in an exercise from ANY routine (e.g. missed Upper day, add a couple of its lifts to today's Legs session)
  const addExerciseFromLibrary = (libEx) => {
    const last = lastTimeFor(libEx.name);
    const n = last ? last.sets.length : 3;
    const newEx = {
      exercise: libEx.name, range: libEx.range, cat: libEx.cat,
      sets: Array.from({ length: n }, (_, i) => {
        const prevSet = last && last.sets[i];
        return { w: prevSet ? prevSet.w : "", r: prevSet ? prevSet.r : "", done: false };
      }),
    };
    updateActive({ exercises: [...active.exercises, newEx] });
  };

  const finishSession = () => {
    if (active.run) {
      const rec = { run: true, dist: active.dist, time: active.time, hr: active.hr };
      setWorkouts((w) => ({ ...w, [active.date]: rec }));
      setCompleted((c) => ({ ...c, [active.date]: { ...(c[active.date] || {}), zone2: true } }));
      setActive(null); setTimer(null);
      return;
    }
    const cleaned = active.exercises
      .map((ex) => ({ exercise: ex.exercise, range: ex.range, cat: ex.cat,
        sets: ex.sets.filter((s) => s.w !== "" || s.r !== "").map((s) => ({ w: s.w, r: s.r })) }))
      .filter((ex) => ex.sets.length > 0);
    setWorkouts((w) => ({ ...w, [active.date]: cleaned }));
    setCompleted((c) => ({ ...c, [active.date]: { ...(c[active.date] || {}), gym: true } }));
    setActive(null);
    setTimer(null);
  };
  const abandonSession = () => {
    if (!abandonArmed) { setAbandonArmed(true); return; }
    setActive(null);
    setTimer(null);
    setAbandonArmed(false);
  };

  // ── No active session: show start screen + today's saved (if any) ──
  if (!active) {
    const todaysLogged = workouts[sel];
    const allSessions = [...Object.keys(SPLIT), ...RUN_SESSIONS];
    return (
      <React.Fragment>
        <div style={card}>
          <span style={fieldLabel}>Start a workout</span>
          <div style={{display:"flex", gap:8, marginTop:8}}>
            <select value={session} onChange={(e)=>setSession(e.target.value)} style={{...input, flex:1}}>
              {allSessions.map((s)=><option key={s}>{s}</option>)}
            </select>
            <button onClick={startSession} style={addBtn}>Start</button>
          </div>
          <p style={{fontSize:11, color:C.dim, margin:"8px 0 0"}}>
            {isRun(session)
              ? "Run session — log distance, time and average heart rate when done."
              : "Lifting session — set count is prefilled from last time; rest timers start automatically."}
          </p>
        </div>

        {todaysLogged && (
          <div style={{marginTop:14}}>
            {todaysLogged.run ? (
              <div style={{...card, borderColor:C.blue}}>
                <div style={{display:"flex", alignItems:"center", gap:8}}>
                  <span style={{color:C.blue, fontWeight:600, fontSize:13, flex:1}}>✓ Zone 2 run — {fmtDate(sel)}</span>
                  <button onClick={editLoggedSession} style={{...ghostBtn, padding:"5px 12px", marginTop:0, borderColor:C.blue, color:C.blue}}>Edit</button>
                </div>
                <div style={{fontSize:13, color:C.dim, marginTop:6}}>
                  {todaysLogged.dist} km · {todaysLogged.time} min · {todaysLogged.hr} bpm avg
                  {todaysLogged.dist && todaysLogged.time ? ` · ${(todaysLogged.time/todaysLogged.dist).toFixed(1)} min/km` : ""}
                </div>
              </div>
            ) : todaysLogged.length > 0 ? (
              <React.Fragment>
                <div style={{...card, marginBottom:10, borderColor:C.green, display:"flex", alignItems:"center", gap:8}}>
                  <span style={{color:C.green, fontWeight:600, fontSize:13, flex:1}}>✓ Workout completed {fmtDate(sel)}</span>
                  <button onClick={editLoggedSession} style={{...ghostBtn, padding:"5px 12px", marginTop:0, borderColor:C.green, color:C.green}}>Edit</button>
                </div>
                {todaysLogged.map((ex,ei)=>(
                  <div key={ei} style={{...card, marginBottom:8}}>
                    <div style={{fontWeight:600, fontSize:14, marginBottom:4}}>{ex.exercise}</div>
                    <div style={{fontSize:13, color:C.dim}}>
                      {ex.sets.map((s,i)=><span key={i}>{s.w}×{s.r}{i<ex.sets.length-1?" · ":""}</span>)}
                    </div>
                  </div>
                ))}
              </React.Fragment>
            ) : null}
          </div>
        )}
      </React.Fragment>
    );
  }

  // ── Active RUN session ──
  if (active.run) {
    const pace = active.dist && active.time ? (active.time / active.dist).toFixed(1) : null;
    return (
      <React.Fragment>
        <div style={{...card, marginBottom:14, display:"flex", alignItems:"center", gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600, fontSize:15}}>{active.editing ? `Editing run — ${fmtDate(active.date)}` : active.name}</div>
            <div style={{fontSize:12, color:C.dim, marginTop:2}}>{active.editing ? "Correcting a previously logged run" : "Log your run"}</div>
          </div>
          <button onClick={abandonSession} style={{...ghostBtn, borderColor:C.red, color: abandonArmed?"#fff":C.red, background: abandonArmed?C.red:"transparent", marginTop:0}}>{abandonArmed ? "Tap to confirm" : (active.editing ? "Cancel" : "Abandon")}</button>
        </div>
        <div style={card}>
          <label style={{display:"block", marginBottom:10}}>
            <span style={fieldLabel}>Total distance (km)</span>
            <input type="number" inputMode="decimal" placeholder="e.g. 6.0" value={active.dist} onChange={(e)=>updateActive({dist:e.target.value})} style={input} />
          </label>
          <label style={{display:"block", marginBottom:10}}>
            <span style={fieldLabel}>Total time (min)</span>
            <input type="number" inputMode="decimal" placeholder="e.g. 45" value={active.time} onChange={(e)=>updateActive({time:e.target.value})} style={input} />
          </label>
          <label style={{display:"block"}}>
            <span style={fieldLabel}>Average heart rate (bpm)</span>
            <input type="number" inputMode="numeric" placeholder="e.g. 135" value={active.hr} onChange={(e)=>updateActive({hr:e.target.value})} style={input} />
          </label>
          {pace && <div style={{marginTop:12, fontSize:14, color:C.amber, fontWeight:600}}>Pace: {pace} min/km</div>}
        </div>
        <button onClick={finishSession} style={finishBtn}>{active.editing ? "Save Changes" : "Finish & Save Run"}</button>
      </React.Fragment>
    );
  }

  // ── Active LIFTING session ──
  const totalSets = active.exercises.reduce((a, ex) => a + ex.sets.filter((s) => s.done).length, 0);
  return (
    <React.Fragment>
      {timer && (
        <RestTimer key={timer.endAt} endAt={timer.endAt} onSkip={() => setTimer(null)} />
      )}

      <div style={{...card, marginBottom:14, display:"flex", alignItems:"center", gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:600, fontSize:15}}>{active.editing ? `Editing — ${fmtDate(active.date)}` : active.name}</div>
          <div style={{fontSize:12, color:C.dim, marginTop:2}}>{active.editing ? "Correcting a previously logged workout" : `${totalSets} sets logged`}</div>
        </div>
        <button onClick={abandonSession} style={{...ghostBtn, borderColor:C.red, color: abandonArmed?"#fff":C.red, background: abandonArmed?C.red:"transparent", marginTop:0}}>{abandonArmed ? "Tap to confirm" : (active.editing ? "Cancel" : "Abandon")}</button>
      </div>

      {active.exercises.map((ex, ei) => {
        const last = lastTimeFor(ex.exercise);
        const best = bestFor(ex.exercise);
        return (
          <div key={ei} style={{...card, marginBottom:10}}>
            <div style={{display:"flex", alignItems:"center", marginBottom:8, gap:8}}>
              <span style={{flex:1, fontWeight:600, fontSize:14}}>{ex.exercise}</span>
              <span style={catBadge(ex.cat)}>{fmtRest(REST[ex.cat]||90)} rest</span>
              {ex.range && <span style={rangeBadge}>{ex.range} reps</span>}
            </div>
            {last ? (
              <div style={lastRow}>
                <span style={{color:C.green, fontWeight:600}}>Last ({fmtDate(last.date)}):</span>{" "}
                {last.sets.map((s,i)=><span key={i} style={{color:C.dim}}>{s.w||"—"}×{s.r||"—"}{i<last.sets.length-1?" · ":""}</span>)}
              </div>
            ) : <div style={{...lastRow, color:C.dim}}>No previous data — baseline.</div>}
            {best && (
              <div style={bestRow}>
                <span style={{color:C.blue, fontWeight:600}}>PB:</span>{" "}
                <span style={{color:C.dim}}>{best.w}×{best.r} ({fmtDate(best.date)})</span>
              </div>
            )}
            {ex.sets.map((s,si)=>{
              const ref = last && last.sets[si];
              return (
                <div key={si} style={{display:"flex", gap:8, alignItems:"center", marginBottom:6}}>
                  <span style={{color:C.dim, fontSize:12, width:38}}>#{si+1}</span>
                  <input type="number" inputMode="decimal" placeholder={ref?`${ref.w}`:"weight"} value={s.w} onChange={(e)=>updateSet(ei,si,"w",e.target.value)} style={{...input, flex:1, opacity: s.done?0.7:1}} />
                  <input type="number" inputMode="numeric" placeholder={ref?`${ref.r}`:"reps"} value={s.r} onChange={(e)=>updateSet(ei,si,"r",e.target.value)} style={{...input, flex:1, opacity: s.done?0.7:1}} />
                  {s.done
                    ? <button onClick={()=>unlogSet(ei,si)} style={{...logBtn, background:"transparent", border:`1px solid ${C.green}`, color:C.green}}>✓ edit</button>
                    : <button onClick={()=>logSet(ei,si)} style={logBtn}>Log</button>}
                  <button onClick={()=>removeSet(ei,si)} style={delBtn}>×</button>
                </div>
              );
            })}
            <button onClick={()=>addSet(ei)} style={ghostBtn}>+ add set</button>
          </div>
        );
      })}

      <button onClick={()=>setExPicker(true)} style={{...ghostBtn, width:"100%", padding:"12px 0", marginBottom:14, borderColor:C.blue, color:C.blue}}>
        + Add exercise from another routine
      </button>

      {exPicker && (
        <ExercisePickerModal
          alreadyIn={active.exercises.map((e)=>e.exercise)}
          onPick={(libEx)=>{ addExerciseFromLibrary(libEx); setExPicker(false); }}
          onClose={()=>setExPicker(false)}
        />
      )}

      <button onClick={finishSession} style={finishBtn}>{active.editing ? "Save Changes" : "Finish & Save Workout"}</button>
    </React.Fragment>
  );
}

// ── Modal: pick an exercise from any routine to add to today's session ──
function ExercisePickerModal({ alreadyIn, onPick, onClose }) {
  const [search, setSearch] = useState("");

  // Group every exercise by which routine(s) it belongs to, de-duped by name
  const byRoutine = Object.keys(SPLIT).map((routineName) => ({
    routine: routineName,
    exercises: SPLIT[routineName].filter((ex) => !alreadyIn.includes(ex.name)),
  })).filter((g) => g.exercises.length > 0);

  const q = search.trim().toLowerCase();
  const filtered = q
    ? byRoutine.map((g) => ({ ...g, exercises: g.exercises.filter((e) => e.name.toLowerCase().includes(q)) }))
        .filter((g) => g.exercises.length > 0)
    : byRoutine;

  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex",
      alignItems:"flex-end", justifyContent:"center", zIndex:200,
    }}>
      <div style={{...card, width:"100%", maxWidth:480, maxHeight:"75vh", overflowY:"auto",
        borderRadius:"16px 16px 0 0", padding:16, margin:0}}>
        <div style={{display:"flex", alignItems:"center", marginBottom:10}}>
          <span style={{...fieldLabel, flex:1}}>Add exercise from another routine</span>
          <button onClick={onClose} style={{...ghostBtn, padding:"6px 14px", marginTop:0}}>Close</button>
        </div>
        <input
          type="text" placeholder="Search exercises..." value={search}
          onChange={(e)=>setSearch(e.target.value)} style={{...input, marginBottom:14}}
        />
        {filtered.length === 0 && (
          <p style={{fontSize:13, color:C.dim}}>No matching exercises — everything matching that search is already in today's session.</p>
        )}
        {filtered.map((g) => (
          <div key={g.routine} style={{marginBottom:16}}>
            <div style={{fontSize:12, color:C.amber, fontWeight:600, marginBottom:6, textTransform:"uppercase", letterSpacing:0.5}}>
              {g.routine}
            </div>
            {g.exercises.map((ex) => (
              <button key={ex.name} onClick={()=>onPick(ex)} style={{
                display:"flex", alignItems:"center", gap:8, width:"100%",
                background:C.panel2, border:`1px solid ${C.line}`, borderRadius:8,
                padding:"10px 12px", marginBottom:6, cursor:"pointer", textAlign:"left",
              }}>
                <span style={{flex:1, fontSize:14, color:C.text}}>{ex.name}</span>
                <span style={catBadge(ex.cat)}>{ex.cat}</span>
                {ex.range && <span style={rangeBadge}>{ex.range}</span>}
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Workout completion calendar ────────────────────────────────
function WorkoutCalendar({ completed, setCompleted }) {
  const [month, setMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });

  const SCHED = { 0: "rest", 1: "gym", 2: "gym", 3: "zone2", 4: "gym", 5: "gym", 6: "zone2" };
  const first = new Date(month.y, month.m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(month.y, month.m + 1, 0).getDate();
  const monthName = first.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const keyFor = (d) => `${month.y}-${String(month.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  const prevMonth = () => setMonth((mm) => mm.m === 0 ? { y: mm.y-1, m: 11 } : { y: mm.y, m: mm.m-1 });
  const nextMonth = () => setMonth((mm) => mm.m === 11 ? { y: mm.y+1, m: 0 } : { y: mm.y, m: mm.m+1 });

  return (
    <div style={{...card, marginBottom:14}}>
      <div style={{display:"flex", alignItems:"center", marginBottom:12}}>
        <span style={{...fieldLabel, flex:1}}>Workout calendar</span>
        <button onClick={prevMonth} style={calNav}>‹</button>
        <span style={{fontSize:13, color:C.text, padding:"0 10px", minWidth:130, textAlign:"center"}}>{monthName}</span>
        <button onClick={nextMonth} style={calNav}>›</button>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4}}>
        {["S","M","T","W","T","F","S"].map((d,i)=>(
          <div key={i} style={{textAlign:"center", fontSize:10, color:C.dim, paddingBottom:2}}>{d}</div>
        ))}
        {cells.map((d,i)=>{
          if (!d) return <div key={i} />;
          const k = keyFor(d);
          const rec = completed[k] || {};
          const dow = new Date(month.y, month.m, d).getDay();
          const planned = SCHED[dow];
          const did = planned === "gym" ? rec.gym : planned === "zone2" ? rec.zone2 : null;
          const isToday = k === todayStr();

          let bg = C.panel2, bd = C.line, fg = C.dim;
          if (planned === "gym") {
            if (rec.gym) { bg = "rgba(95,184,122,0.2)"; bd = C.green; fg = C.green; }
            else { bd = "rgba(224,164,73,0.3)"; }
          } else if (planned === "zone2") {
            if (rec.zone2) { bg = "rgba(91,155,213,0.2)"; bd = C.blue; fg = C.blue; }
            else { bd = "rgba(91,155,213,0.25)"; }
          }
          return (
            <div key={i}
              style={{
                aspectRatio:"1", borderRadius:8, border:`1px solid ${bd}`, background:bg,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                outline: isToday ? `2px solid ${C.amber}` : "none", outlineOffset:"-1px",
              }}>
              <span style={{fontSize:12, color: did ? fg : C.text, fontWeight: did ? 700 : 400}}>{d}</span>
              {planned === "gym" && <span style={{fontSize:9, color:fg, lineHeight:1}}>{rec.gym ? "✓ gym" : "gym"}</span>}
              {planned === "zone2" && <span style={{fontSize:9, color:fg, lineHeight:1}}>{rec.zone2 ? "✓ run" : "run"}</span>}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex", gap:14, marginTop:12, fontSize:11, color:C.dim, flexWrap:"wrap"}}>
        <span><span style={{color:C.green}}>■</span> gym done</span>
        <span><span style={{color:C.blue}}>■</span> zone 2 done</span>
      </div>
      <p style={{fontSize:11, color:C.dim, margin:"8px 0 0"}}>
        Days auto-check when you finish a workout — gym (Mon/Tue/Thu/Fri) from a lifting session, run (Wed/Sat) from a Zone 2 run.
      </p>
    </div>
  );
}

// ── Interactive weight chart with zoom + tap tooltip ──────────────
function WeightChart({ weighIns }) {
  const [view, setView] = useState("full"); // 'full' | 'rolling'
  const [picked, setPicked] = useState(null); // index into visible weigh-ins

  // determine window [winStart, winEnd] in ms
  const phaseStart = new Date(PLAN.dexa.start.date).getTime();
  const phaseEnd = new Date(PLAN.dexa.next.date).getTime();
  let winStart = phaseStart, winEnd = phaseEnd;
  if (view === "rolling") {
    const lastMs = weighIns.length ? new Date(weighIns[weighIns.length-1].date).getTime() : Date.now();
    winEnd = lastMs + 2*86400000;          // small pad after latest entry
    winStart = winEnd - 30*86400000;        // ~4 weeks back from latest
  }
  const span = (winEnd - winStart) || 1;

  // visible weigh-ins within window
  const vis = weighIns.filter((w)=>{ const t=new Date(w.date).getTime(); return t>=winStart-1 && t<=winEnd+1; });

  // 7-day rolling average over ALL weigh-ins (so the line is correct at window edges), then filter to window
  const avgPts = useMemo(()=>{
    const out=[];
    for (let i=0;i<weighIns.length;i++){
      const endT=new Date(weighIns[i].date).getTime();
      const windowVals=weighIns.filter((w)=>{ const t=new Date(w.date).getTime(); return t<=endT && t>endT-7*86400000; }).map((w)=>w.weight);
      const a=windowVals.reduce((x,y)=>x+y,0)/windowVals.length;
      out.push({ date: weighIns[i].date, weight: a });
    }
    return out;
  }, [weighIns]);

  // y-axis bounds from visible data + projection within window
  const projInWin = PLAN.trajectory.filter((t)=>{ const ms=new Date(t.date).getTime(); return ms>=winStart-1 && ms<=winEnd+1; });
  const allW=[...vis.map((w)=>w.weight), ...projInWin.map((t)=>t.weight)];
  if (allW.length===0) allW.push(PLAN.dexa.start.weight);
  const minW=Math.floor(Math.min(...allW)-1.5), maxW=Math.ceil(Math.max(...allW)+1.5);
  const wRange = maxW - minW || 1;

  // Y-axis: pick 4-5 clean gridline values spanning minW to maxW
  const yGridLines = useMemo(() => {
    const step = wRange <= 6 ? 1 : wRange <= 12 ? 2 : wRange <= 20 ? 4 : 5;
    const start = Math.ceil(minW / step) * step;
    const lines = [];
    for (let v = start; v <= maxW; v += step) lines.push(v);
    return lines;
  }, [minW, maxW, wRange]);

  const PADX=4; // % horizontal padding so edge points are visible/tappable
  const PADY_LEFT = 36; // px reserved for y-axis labels
  const xOf=(ms)=>PADX + ((ms-winStart)/span)*(100-2*PADX);
  const yOf=(w)=>100-((w-minW)/wRange)*100;
  const xy=(date,w)=>[xOf(new Date(date).getTime()), Math.max(0,Math.min(100,yOf(w)))];
  const toPath=(pts)=>pts.map((p,i)=>`${i?"L":"M"}${p[0]},${p[1]}`).join(" ");

  // build projection line + band clipped to window (interpolate is overkill; sample trajectory pts in-window plus edges)
  const projPts = PLAN.trajectory.map((t)=>xy(t.date,t.weight));
  const bandU = PLAN.trajectory.map((t)=>xy(t.date,t.weight+PLAN.band));
  const bandL = PLAN.trajectory.map((t)=>xy(t.date,t.weight-PLAN.band));
  const bandPath = toPath(bandU)+" "+bandL.slice().reverse().map((p)=>`L${p[0]},${p[1]}`).join(" ")+" Z";

  const actualPts = vis.map((w)=>xy(w.date,w.weight));
  const avgVis = avgPts.filter((w)=>{ const t=new Date(w.date).getTime(); return t>=winStart-1 && t<=winEnd+1; });
  const avgLine = avgVis.map((w)=>xy(w.date,w.weight));

  const sel = picked!=null && vis[picked] ? vis[picked] : null;

  return (
    <div style={card}>
      <div style={{display:"flex", alignItems:"center", marginBottom:6}}>
        <span style={{...fieldLabel, flex:1}}>Weight vs projection</span>
        <div style={{display:"flex", gap:4}}>
          {[["rolling","4 wks"],["full","Full"]].map(([k,label])=>(
            <button key={k} onClick={()=>{setView(k); setPicked(null);}} style={{
              ...miniToggle,
              background: view===k?C.amber:C.panel2,
              color: view===k?"#1a1206":C.dim,
              borderColor: view===k?C.amber:C.line,
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* tooltip area (fixed height so layout doesn't jump) */}
      <div style={{height:22, marginBottom:2}}>
        {sel ? (
          <span style={{fontSize:13, color:C.amber, fontWeight:600}}>
            {fmtDate(sel.date)} — {sel.weight.toFixed(1)} lb
            {sel.note ? <span style={{color:C.dim, fontWeight:400}}> · {sel.note}</span> : null}
          </span>
        ) : (
          <span style={{fontSize:12, color:C.dim}}>Tap a point to see its date &amp; weight</span>
        )}
      </div>

      <div style={{position:"relative", height:210, display:"flex"}}>
        {/* Y-axis labels */}
        <div style={{position:"relative", width:PADY_LEFT, flexShrink:0}}>
          {yGridLines.map((v)=>(
            <div key={v} style={{
              position:"absolute",
              right:4,
              top:`${yOf(v)}%`,
              transform:"translateY(-50%)",
              fontSize:10,
              color:C.dim,
              whiteSpace:"nowrap",
              fontVariantNumeric:"tabular-nums",
            }}>{v}</div>
          ))}
        </div>
        {/* Chart area */}
        <div style={{position:"relative", flex:1}}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:"100%", height:"100%"}}>
            {/* Gridlines aligned to actual weight values */}
            {yGridLines.map((v)=>(
              <line key={v} x1="0" y1={yOf(v)} x2="100" y2={yOf(v)} stroke={C.line} strokeWidth="0.4" />
            ))}
            <path d={bandPath} fill="rgba(224,164,73,0.15)" stroke="none" />
            <path d={toPath(projPts)} fill="none" stroke={C.dim} strokeWidth="0.8" strokeDasharray="2 2" vectorEffect="non-scaling-stroke" />
            {view==="rolling" && avgLine.length>1 && (
              <path d={toPath(avgLine)} fill="none" stroke={C.green} strokeWidth="1.2" vectorEffect="non-scaling-stroke" />
            )}
            {actualPts.length>0 && <path d={toPath(actualPts)} fill="none" stroke={C.amber} strokeWidth="1.4" vectorEffect="non-scaling-stroke" />}
            {sel && (()=>{ const p=xy(sel.date,sel.weight); return <line x1={p[0]} y1="0" x2={p[0]} y2="100" stroke={C.amber} strokeWidth="0.5" strokeDasharray="1 1" vectorEffect="non-scaling-stroke" />; })()}
          </svg>
          {/* Tappable overlay dots */}
          <div style={{position:"absolute", inset:0}}>
            {actualPts.map((p,i)=>(
              <button key={i} onClick={()=>setPicked(picked===i?null:i)} aria-label={`${vis[i].date} ${vis[i].weight}`}
                style={{position:"absolute", left:`${p[0]}%`, top:`${p[1]}%`, transform:"translate(-50%,-50%)",
                  width:22, height:22, padding:0, borderRadius:"50%", border:"none", background:"transparent", cursor:"pointer"}}>
                <span style={{display:"block", width: picked===i?10:7, height: picked===i?10:7, margin:"auto",
                  borderRadius:"50%", background:C.amber, border: picked===i?`2px solid ${C.text}`:"none"}} />
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:"flex", justifyContent:"space-between", fontSize:10, color:C.dim, marginTop:4}}>
        <span>{fmtDate(new Date(winStart).toISOString().slice(0,10))}</span>
        <span>{fmtDate(new Date(winEnd).toISOString().slice(0,10))}{view==="full"?" (DEXA)":""}</span>
      </div>

      <div style={{display:"flex", gap:14, marginTop:10, fontSize:11, color:C.dim, flexWrap:"wrap"}}>
        <span><span style={{color:C.amber}}>●</span> weigh-ins</span>
        {view==="rolling" && <span><span style={{color:C.green}}>▬</span> 7-day avg</span>}
        <span><span style={{color:C.dim}}>┄</span> projected</span>
        <span><span style={{color:C.amber}}>▬</span> ±1 lb band</span>
      </div>
    </div>
  );
}

// ── Exercise progress: compounds in time-series, secondaries in list ──
function ExerciseProgress({ workouts }) {
  // Build per-exercise session history: avg weight & avg reps across sets each day
  const history = useMemo(() => {
    const byEx = {}; // name -> [{date, avgW, avgR, cat}]
    Object.keys(workouts).sort().forEach((d) => {
      const day = workouts[d];
      if (!day || day.run || !Array.isArray(day)) return;
      day.forEach((ex) => {
        const ws = ex.sets.map((s)=>parseFloat(s.w)).filter((n)=>!isNaN(n));
        const rs = ex.sets.map((s)=>parseFloat(s.r)).filter((n)=>!isNaN(n));
        if (!ws.length && !rs.length) return;
        const avgW = ws.length ? ws.reduce((a,b)=>a+b,0)/ws.length : 0;
        const avgR = rs.length ? rs.reduce((a,b)=>a+b,0)/rs.length : 0;
        if (!byEx[ex.exercise]) byEx[ex.exercise] = [];
        byEx[ex.exercise].push({ date: d, avgW: +avgW.toFixed(1), avgR: +avgR.toFixed(1), cat: ex.cat });
      });
    });
    return byEx;
  }, [workouts]);

  // categorize using the SPLIT definitions (so it works even before much data)
  const catOf = useMemo(() => {
    const m = {};
    Object.values(SPLIT).forEach((arr)=>arr.forEach((ex)=>{ m[ex.name]=ex.cat; }));
    return m;
  }, []);

  const compounds = Object.keys(history).filter((n)=>catOf[n]==="primary");
  const secondaries = Object.keys(history).filter((n)=>catOf[n]==="secondary");

  const [picked, setPicked] = useState(null);
  const compoundList = compounds.length ? compounds : Object.keys(SPLIT).flatMap((s)=>SPLIT[s]).filter((e)=>e.cat==="primary").map((e)=>e.name).filter((v,i,a)=>a.indexOf(v)===i);
  const sel = picked || compoundList[0];
  const series = history[sel] || [];

  return (
    <div style={{...card, marginTop:14}}>
      <span style={fieldLabel}>Exercise progress</span>

      {/* Compound selector */}
      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:10}}>
        {compoundList.map((n)=>(
          <button key={n} onClick={()=>setPicked(n)} style={{
            ...chipBtn,
            background: sel===n ? C.amber : C.panel2,
            color: sel===n ? "#1a1206" : C.dim,
            borderColor: sel===n ? C.amber : C.line,
          }}>{n}</button>
        ))}
      </div>

      {/* Time-series chart for selected compound: avg weight over time */}
      <CompoundChart series={series} name={sel} />

      {/* Secondary lifts in list form */}
      {secondaries.length > 0 && (
        <div style={{marginTop:18}}>
          <div style={{fontSize:12, color:C.dim, textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>Secondary lifts — latest</div>
          {secondaries.map((n)=>{
            const s = history[n];
            const latest = s[s.length-1];
            const first = s[0];
            const delta = s.length>1 ? (latest.avgW - first.avgW) : 0;
            return (
              <div key={n} style={{display:"flex", alignItems:"center", gap:8, padding:"7px 0", borderBottom:`1px solid ${C.line}`, fontSize:13}}>
                <span style={{flex:1}}>{n}</span>
                <span style={{color:C.dim}}>{latest.avgW}×{latest.avgR}</span>
                {s.length>1 && <span style={{color: delta>0?C.green:delta<0?C.red:C.dim, width:54, textAlign:"right"}}>{delta>0?"+":""}{delta.toFixed(1)}</span>}
              </div>
            );
          })}
          <p style={{fontSize:11, color:C.dim, margin:"8px 0 0"}}>Showing avg weight × avg reps across sets, most recent session. Change is vs first logged session.</p>
        </div>
      )}

      {compoundList.length>0 && series.length===0 && (
        <p style={{fontSize:13, color:C.dim, marginTop:12}}>Log a few {sel} sessions and your avg-weight trend will plot here.</p>
      )}
    </div>
  );
}

function CompoundChart({ series, name }) {
  if (!series || series.length === 0) return null;
  if (series.length === 1) {
    const p = series[0];
    return <div style={{marginTop:12, fontSize:13, color:C.dim}}>{name}: {p.avgW} lb × {p.avgR} reps avg on {fmtDate(p.date)}. One more session unlocks the trend chart.</div>;
  }
  const ws = series.map((p)=>p.avgW);
  const minW = Math.floor(Math.min(...ws) - 5);
  const maxW = Math.ceil(Math.max(...ws) + 5);
  const t0 = new Date(series[0].date).getTime();
  const t1 = new Date(series[series.length-1].date).getTime();
  const span = (t1 - t0) || 1;
  const xy = (p) => {
    const x = ((new Date(p.date).getTime() - t0) / span) * 100;
    const y = 100 - ((p.avgW - minW) / (maxW - minW || 1)) * 100;
    return [x, y];
  };
  const pts = series.map(xy);
  const path = pts.map((p,i)=>`${i?"L":"M"}${p[0]},${p[1]}`).join(" ");
  const latest = series[series.length-1];
  const change = (latest.avgW - series[0].avgW).toFixed(1);

  return (
    <div style={{marginTop:12}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6}}>
        <span style={{fontSize:13, color:C.text, fontWeight:600}}>{latest.avgW} lb avg</span>
        <span style={{fontSize:12, color: change>0?C.green:change<0?C.red:C.dim}}>{change>0?"+":""}{change} lb since start</span>
      </div>
      <div style={{position:"relative", height:150}}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:"100%", height:"100%"}}>
          {[0,50,100].map((g)=><line key={g} x1="0" y1={g} x2="100" y2={g} stroke={C.line} strokeWidth="0.3" />)}
          <path d={path} fill="none" stroke={C.amber} strokeWidth="1.4" vectorEffect="non-scaling-stroke" />
          {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="1.3" fill={C.amber} vectorEffect="non-scaling-stroke" />)}
        </svg>
        <div style={{position:"absolute", top:0, left:2, fontSize:10, color:C.dim}}>{maxW}</div>
        <div style={{position:"absolute", bottom:0, left:2, fontSize:10, color:C.dim}}>{minW} lb</div>
      </div>
      <div style={{display:"flex", justifyContent:"space-between", fontSize:10, color:C.dim, marginTop:4}}>
        <span>{fmtDate(series[0].date)}</span><span>{fmtDate(latest.date)}</span>
      </div>
    </div>
  );
}

// ── Zone 2 Run Efficiency Factor tracker ──────────────────────────
// EF = speed (km/h) ÷ avg HR. Higher EF = more speed per heartbeat = improving aerobic efficiency.
function RunEfficiencyChart({ workouts }) {
  const [range, setRange] = useState("12w"); // '4w' | '12w' | '24w' | 'all'

  const runs = useMemo(() => {
    const out = [];
    Object.keys(workouts).sort().forEach((d) => {
      const w = workouts[d];
      if (!w || !w.run) return;
      const dist = parseFloat(w.dist), time = parseFloat(w.time), hr = parseFloat(w.hr);
      if (!dist || !time || !hr) return; // need all three to compute EF
      const speedKmh = dist / (time / 60);     // km/h
      const paceMinKm = time / dist;           // min/km
      const ef = +(speedKmh / hr).toFixed(4);
      out.push({ date: d, dist, time, hr, speedKmh, paceMinKm, ef });
    });
    return out;
  }, [workouts]);

  if (runs.length === 0) {
    return (
      <div style={{...card, marginTop:14}}>
        <span style={fieldLabel}>Zone 2 efficiency factor</span>
        <p style={{fontSize:13, color:C.dim, marginTop:10}}>
          Log a Zone 2 run with distance, time, and avg HR to start tracking efficiency factor (speed per heartbeat) over time. Improvements show up over months, not weeks — this is a long-game metric.
        </p>
      </div>
    );
  }

  const latest = runs[runs.length - 1];
  const paceStr = (p) => `${Math.floor(p)}:${Math.round((p % 1) * 60).toString().padStart(2, "0")}`;

  // Filter to range — always backward-looking from latest run, never projecting forward
  const rangeDays = { "4w": 28, "12w": 84, "24w": 168, "all": null };
  const days = rangeDays[range];
  const latestMs = new Date(latest.date).getTime();
  const visible = days ? runs.filter((r) => (latestMs - new Date(r.date).getTime()) / 86400000 <= days) : runs;

  // Linear regression trend line over visible EF points
  const trend = useMemo(() => {
    if (visible.length < 2) return null;
    const t0 = new Date(visible[0].date).getTime();
    const xs = visible.map((r) => (new Date(r.date).getTime() - t0) / 86400000); // days since first visible
    const ys = visible.map((r) => r.ef);
    const n = xs.length;
    const sumX = xs.reduce((a,b)=>a+b,0), sumY = ys.reduce((a,b)=>a+b,0);
    const sumXY = xs.reduce((a,x,i)=>a+x*ys[i],0), sumXX = xs.reduce((a,x)=>a+x*x,0);
    const denom = (n*sumXX - sumX*sumX);
    if (denom === 0) return null;
    const slope = (n*sumXY - sumX*sumY) / denom;
    const intercept = (sumY - slope*sumX) / n;
    return { t0, slope, intercept,
      start: intercept,
      end: intercept + slope * xs[xs.length-1] };
  }, [visible]);

  // y-axis bounds
  const efs = visible.map((r) => r.ef);
  const minEF = Math.min(...efs), maxEF = Math.max(...efs);
  const pad = (maxEF - minEF) * 0.15 || 0.005;
  const yMin = +(minEF - pad).toFixed(4), yMax = +(maxEF + pad).toFixed(4);

  const t0 = visible.length ? new Date(visible[0].date).getTime() : 0;
  const t1 = visible.length ? new Date(visible[visible.length-1].date).getTime() : 1;
  const span = (t1 - t0) || 1;
  const PADX = 4;
  const xOf = (ms) => PADX + ((ms - t0) / span) * (100 - 2*PADX);
  const yOf = (ef) => 100 - ((ef - yMin) / (yMax - yMin || 1)) * 100;

  const pts = visible.map((r) => [xOf(new Date(r.date).getTime()), yOf(r.ef)]);
  const path = pts.map((p,i)=>`${i?"L":"M"}${p[0]},${p[1]}`).join(" ");

  let trendPath = null;
  if (trend) {
    const x0 = visible[0].date, x1 = visible[visible.length-1].date;
    const daysSpan = (new Date(x1).getTime() - new Date(x0).getTime()) / 86400000;
    const p0 = [xOf(new Date(x0).getTime()), yOf(trend.start)];
    const p1 = [xOf(new Date(x1).getTime()), yOf(trend.intercept + trend.slope*daysSpan)];
    trendPath = `M${p0[0]},${p0[1]} L${p1[0]},${p1[1]}`;
  }

  const improving = trend && trend.slope > 0;

  return (
    <div style={{...card, marginTop:14}}>
      <div style={{display:"flex", alignItems:"center", marginBottom:6}}>
        <span style={{...fieldLabel, flex:1}}>Zone 2 efficiency factor</span>
      </div>

      {/* Most recent run note */}
      <div style={{padding:10, borderRadius:8, background:C.panel2, border:`1px solid ${C.line}`, marginBottom:12}}>
        <div style={{fontSize:11, color:C.dim, marginBottom:4}}>Most recent run — {fmtDate(latest.date)}</div>
        <div style={{display:"flex", gap:16, fontSize:14}}>
          <span><span style={{color:C.blue, fontWeight:600}}>{paceStr(latest.paceMinKm)}</span> <span style={{color:C.dim, fontSize:12}}>min/km</span></span>
          <span><span style={{color:C.red, fontWeight:600}}>{latest.hr}</span> <span style={{color:C.dim, fontSize:12}}>bpm avg</span></span>
          <span><span style={{color:C.amber, fontWeight:600}}>{latest.ef}</span> <span style={{color:C.dim, fontSize:12}}>EF</span></span>
        </div>
      </div>

      {/* Range toggle */}
      <div style={{display:"flex", gap:4, marginBottom:10, flexWrap:"wrap"}}>
        {[["4w","4 wks"],["12w","12 wks"],["24w","24 wks"],["all","All time"]].map(([k,label])=>(
          <button key={k} onClick={()=>setRange(k)} style={{
            ...miniToggle,
            background: range===k?C.amber:C.panel2,
            color: range===k?"#1a1206":C.dim,
            borderColor: range===k?C.amber:C.line,
          }}>{label}</button>
        ))}
      </div>

      {visible.length < 2 ? (
        <p style={{fontSize:13, color:C.dim, marginTop:6}}>
          Need at least 2 runs in this window to plot a trend. {visible.length === 1 ? "You have 1 so far — log another Zone 2 run." : "Try a wider range."}
        </p>
      ) : (
        <React.Fragment>
          <div style={{position:"relative", height:180}}>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:"100%", height:"100%"}}>
              {[0,25,50,75,100].map((g)=><line key={g} x1="0" y1={g} x2="100" y2={g} stroke={C.line} strokeWidth="0.3" />)}
              {trendPath && <path d={trendPath} fill="none" stroke={improving?C.green:C.red} strokeWidth="1" strokeDasharray="3 2" vectorEffect="non-scaling-stroke" />}
              <path d={path} fill="none" stroke={C.amber} strokeWidth="1.4" vectorEffect="non-scaling-stroke" />
              {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="1.2" fill={C.amber} vectorEffect="non-scaling-stroke" />)}
            </svg>
            <div style={{position:"absolute", top:0, left:4, fontSize:10, color:C.dim}}>{yMax}</div>
            <div style={{position:"absolute", bottom:0, left:4, fontSize:10, color:C.dim}}>{yMin}</div>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", fontSize:10, color:C.dim, marginTop:4}}>
            <span>{fmtDate(visible[0].date)}</span><span>{fmtDate(visible[visible.length-1].date)}</span>
          </div>
          <div style={{display:"flex", gap:14, marginTop:10, fontSize:11, color:C.dim, flexWrap:"wrap"}}>
            <span><span style={{color:C.amber}}>●</span> EF per run</span>
            <span><span style={{color: improving?C.green:C.red}}>┄</span> trend ({improving?"improving":"declining"})</span>
          </div>
          <p style={{fontSize:11, color:C.dim, margin:"8px 0 0"}}>
            EF = speed ÷ avg heart rate. A rising trend means you're covering more distance per heartbeat — your aerobic base is improving. Expect this to move slowly; week-to-week noise is normal.
          </p>
        </React.Fragment>
      )}
    </div>
  );
}

function BackupPanel({ days, workouts, completed, savedMeals, setDays, setWorkouts, setCompleted, setSavedMeals, supplements, setSupplements, water, setWater }) {
  const [text, setText] = useState("");
  const [msg, setMsg] = useState("");
  const [confirmArmed, setConfirmArmed] = useState(false);
  const [ghToken, setGhToken] = useState(getGitHubToken() || "");
  const [backingUp, setBackingUp] = useState(false);
  const [tokenModal, setTokenModal] = useState(false);
  const [tokenInput, setTokenInput] = useState("");

  const exportData = () => {
    const bundle = { v: 1, exportedAt: new Date().toISOString(), days, workouts, completed, savedMeals, supplements, water };
    const str = JSON.stringify(bundle);
    setText(str);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(str).then(
        () => setMsg("Copied to clipboard — paste somewhere safe."),
        () => setMsg("Select the text below and copy it.")
      );
    } else {
      setMsg("Select the text below and copy it.");
    }
  };

  const backupToGitHub = async () => {
    if (!ghToken.trim()) {
      setMsg("No GitHub token. Tap 'Set GitHub Token' first.");
      return;
    }
    setBackingUp(true);
    const bundle = { v: 1, exportedAt: new Date().toISOString(), days, workouts, completed, savedMeals, supplements, water };
    const result = await createGitHubGist(ghToken, bundle);
    setBackingUp(false);
    if (result.success) {
      setMsg(`✓ Backed up to GitHub Gist`);
    } else {
      setMsg(`GitHub backup failed: ${result.error}`);
    }
  };

  const saveToken = () => {
    if (!tokenInput.trim()) {
      setMsg("Token cannot be empty.");
      return;
    }
    setGitHubToken(tokenInput);
    setGhToken(tokenInput);
    setTokenInput("");
    setTokenModal(false);
    setMsg("✓ GitHub token saved locally (never leaves your device).");
  };

  const clearGhToken = () => {
    clearGitHubToken();
    setGhToken("");
    setMsg("GitHub token cleared.");
  };

  const importData = () => {
    if (!text.trim()) { setMsg("Paste your backup text into the box first."); return; }
    let b;
    try {
      b = JSON.parse(text.trim());
    } catch {
      setMsg("That doesn't look like valid backup text. Check you pasted the whole thing.");
      return;
    }
    if (!b || typeof b !== "object") {
      setMsg("That doesn't look like a valid backup.");
      return;
    }
    if (!confirmArmed) {
      setConfirmArmed(true);
      setMsg("This will REPLACE all current data. Tap Import again to confirm.");
      return;
    }
    // second tap confirms
    try {
      if (b.days) setDays(b.days);
      if (b.workouts) setWorkouts(b.workouts);
      if (b.completed) setCompleted(b.completed);
      if (b.savedMeals) setSavedMeals(b.savedMeals);
      if (b.supplements) setSupplements(b.supplements);
      if (b.water) setWater(b.water);
      const nDays = b.days ? Object.keys(b.days).length : 0;
      const nWk = b.workouts ? Object.keys(b.workouts).length : 0;
      setConfirmArmed(false);
      setMsg(`Imported ✓ — ${nDays} day(s), ${nWk} workout(s) restored.`);
    } catch (e) {
      setMsg("Import failed while saving. Try again.");
    }
  };

  return (
    <div style={{...card, marginTop:14}}>
      <span style={fieldLabel}>Backup &amp; restore</span>
      <p style={{fontSize:12, color:C.dim, margin:"8px 0 0"}}>
        Export/Import bundles all data. GitHub Gist creates secure cloud backups with one tap.
      </p>

      {/* GitHub Backup Section */}
      <div style={{marginTop:12, padding:10, borderRadius:8, background:C.panel2, border:`1px solid ${C.line}`}}>
        <div style={{fontSize:13, fontWeight:600, marginBottom:6}}>GitHub Gist Backup</div>
        {ghToken ? (
          <React.Fragment>
            <div style={{fontSize:11, color:C.green, marginBottom:8}}>✓ Token set (secure, local only)</div>
            <div style={{display:"flex", gap:6}}>
              <button onClick={backupToGitHub} disabled={backingUp} style={{...addBtn, flex:1, padding:"8px 0", opacity: backingUp?0.6:1}}>
                {backingUp ? "Backing up..." : "Backup Now"}
              </button>
              <button onClick={clearGhToken} style={{...ghostBtn, padding:"8px 0", minWidth:80}}>Clear</button>
            </div>
          </React.Fragment>
        ) : (
          <button onClick={() => setTokenModal(true)} style={{...addBtn, width:"100%", padding:"8px 0"}}>Set GitHub Token</button>
        )}
        <p style={{fontSize:10, color:C.dim, margin:"6px 0 0"}}>Creates private timestamped gists. Token never leaves your device.</p>
      </div>

      {/* Token input modal */}
      {tokenModal && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:16
        }}>
          <div style={{...card, maxWidth:400, width:"100%", padding:16}}>
            <div style={{fontSize:14, fontWeight:600, marginBottom:8}}>GitHub Personal Access Token</div>
            <p style={{fontSize:12, color:C.dim, marginBottom:10}}>
              Create a token at <span style={{fontFamily:"monospace", color:C.text}}>github.com/settings/tokens</span> with 'gist' scope.
            </p>
            <input
              type="password"
              placeholder="ghp_..."
              value={tokenInput}
              onChange={(e) => setTokenInput(e.target.value)}
              style={{...input, marginBottom:10}}
            />
            <div style={{display:"flex", gap:8}}>
              <button onClick={saveToken} style={{...addBtn, flex:1, padding:"10px 0"}}>Save</button>
              <button onClick={() => { setTokenModal(false); setTokenInput(""); }} style={{...ghostBtn, flex:1, padding:"10px 0"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Standard Export/Import */}
      <div style={{marginTop:12}}>
        <div style={{display:"flex", gap:8}}>
          <button onClick={exportData} style={{...addBtn, flex:1, padding:"10px 0"}}>Export</button>
          <button onClick={importData} style={{...addBtn, flex:1, padding:"10px 0", background: confirmArmed?C.red:C.blue, color: confirmArmed?"#fff":"#06121f"}}>
            {confirmArmed ? "Confirm import" : "Import"}
          </button>
        </div>
        <textarea
          value={text}
          onChange={(e)=>{ setText(e.target.value); setConfirmArmed(false); }}
          placeholder="Your exported backup text appears here. To restore, paste a backup in and tap Import."
          style={{...input, height:90, resize:"vertical", fontFamily:"monospace", fontSize:11, marginTop:8}}
        />
      </div>

      {msg && <p style={{fontSize:12, color: msg.includes("✓")?C.green:msg.includes("failed")?C.red:C.amber, margin:"8px 0 0"}}>{msg}</p>}
    </div>
  );
}

  return <div style={{display:"flex", justifyContent:"space-between", borderBottom:`1px solid ${C.line}`, padding:"3px 0"}}><span style={{color:C.dim}}>{k}</span><span style={{color:C.text}}>{v}</span></div>;
}
